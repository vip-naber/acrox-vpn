<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 330px;
      font-family: 'Segoe UI', sans-serif;
      background-color: #0b0e14;
      color: #ffffff;
      margin: 0;
      padding: 15px;
    }
    h3 {
      color: #00ecff;
      margin-top: 0;
      text-align: center;
      letter-spacing: 1px;
    }
    .status {
      text-align: center;
      font-size: 13px;
      margin-bottom: 15px;
      padding: 6px;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
    }
    .status span {
      color: #ff9d00;
      font-weight: bold;
    }
    .status.connected span {
      color: #39ff14;
    }
    select, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #1b212c;
      background: #05070a;
      color: #fff;
      font-size: 13px;
    }
    select {
      max-height: 160px;
    }
    button {
      background: #00ecff;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      border: none;
      transition: 0.2s;
    }
    button:hover {
      background: #39ff14;
    }
    button.disconnect {
      background: transparent;
      color: #9eabb5;
      border: 1px solid #1b212c;
    }
    button.disconnect:hover {
      background: #ff3333;
      color: #fff;
    }
    .footer-text {
      font-size: 11px;
      color: #5d6b75;
      text-align: center;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <h3>📡 ACROX VPN Ultra</h3>
  <div class="status" id="statusDiv">Durum: <span id="statusText">KAPALI</span></div>
  
  <label style="font-size: 12px; color: #9eabb5; display:block; margin-bottom:5px;">Yüksek Hızlı Güvenli Omurga:</label>
  <select id="countrySelect">
    <option value="de">🇩🇪 Almanya (Frankfurt)</option>
    <option value="us">🇺🇸 Amerika Birleşik Devletleri</option>
    <option value="gb">🇬🇧 İngiltere (Londra)</option>
    <option value="nl">🇳🇱 Hollanda (Amsterdam)</option>
    <option value="fr">🇫🇷 Fransa (Paris)</option>
    <option value="sg">🇸🇬 Singapur (Merkez)</option>
    <option value="ca">🇨🇦 Kanada (Toronto)</option>
    <option value="jp">🇯🇵 Japonya (Tokyo)</option>
    <option value="au">🇦🇺 Avustralya (Sidney)</option>
    <option value="in">🇮🇳 Hindistan (Mumbai)</option>
    <option value="ch">🇨🇭 İsviçre (Zürih)</option>
    <option value="se">🇸🇪 İsveç (Stockholm)</option>
    <option value="it">🇮🇹 İtalya (Milano)</option>
    <option value="es">🇪🇸 İspanya (Madrid)</option>
    <option value="pl">🇵🇱 Polonya (Varşova)</option>
    <option value="fi">🇫🇮 Finlandiya (Helsinki)</option>
    <option value="no">🇳🇴 Norveç (Oslo)</option>
    <option value="dk">🇩🇰 Danimarka (Kopenhag)</option>
    <option value="at">🇦🇹 Avusturya (Viyana)</option>
    <option value="ie">🇮🇪 İrlanda (Dublin)</option>
    <option value="be">🇧🇪 Belçika (Brüksel)</option>
    <option value="kr">🇰🇷 Güney Kore (Seul)</option>
  </select>

  <button id="connectBtn">Güvenli Bağlan</button>
  <button id="disconnectBtn" class="disconnect">Bağlantıyı Kes</button>

  <div class="footer-text">Acrox Systems Network Integrity v2.0</div>

  <script src="popup.js"></script>
</body>
</html>
